workflows:
  hesabu-zangu-android:
    name: Hesabu Zangu — Android Build
    max_build_duration: 120

    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - push
        - pull_request

      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      # ━━━ 0. FIX ANDROID CONFIGURATION ━━━
      - name: Fix Android configuration
        script: |
          cat > android/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cd android
          chmod +x gradlew
          ./gradlew clean
          cd ..

          echo "Android config fixed"

      # ━━━ 1. FLUTTER VERSION CHECK ━━━
      - name: Flutter version
        script: |
          flutter --version

      # ━━━ 2. INSTALL DEPENDENCIES ━━━
      - name: Install packages
        script: |
          flutter pub get

      # ━━━ 3. ANALYZE CODE ━━━
      - name: Analyze code
        script: |
          flutter pub deps
          flutter doctor -v
          flutter analyze --no-fatal-warnings --no-fatal-infos

      # ━━━ 4. RUN TESTS ━━━
      - name: Run tests
        script: |
          flutter test || echo "Hakuna tests bado"

      # ━━━ 5. CLEAN BUILD ━━━
      - name: Clean build
        script: |
          flutter clean

      # ━━━ 6. BUILD DEBUG APK ━━━
      - name: Build Debug APK
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$(date +%s)

      # ━━━ 7. BUILD RELEASE APK ━━━
      - name: Build Release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$(date +%s) \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ━━━ 8. BUILD APP BUNDLE ━━━
      - name: Build App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$(date +%s)

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - paulomkenya0@gmail.com
        notify:
          success: true
          failure: true
```
