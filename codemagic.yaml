workflows:
  hesabu-zangu-android:
    name: Hesabu Zangu — Android Build
    max_build_duration: 120
    environment:
      flutter: 3.22.5  # ✅ Use known working version
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      # ━━━ 0. FIX V1 EMBEDDING ━━━
      - name: Fix Android configuration
        script: |
          # Create correct gradle.properties
          cat > android/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          # Clean any cached v1 files
          cd android
          ./gradlew clean
          cd ..
          
          echo "✅ Android config fixed"

      # ━━━ 1. Flutter version check ━━━
      - name: Flutter version
        script: flutter --version

      # ━━━ 2. Install dependencies ━━━
      - name: Install packages
        script: flutter pub get

      # ━━━ 3. Code analysis ━━━
      - name: Analyze code
        script: flutter analyze --no-fatal-warnings --no-fatal-infos

      # ━━━ 4. Run tests ━━━
      - name: Run tests
        script: flutter test || echo "Hakuna tests bado"

      # ━━━ 5. Clean build ━━━
      - name: Clean build
        script: flutter clean

      # ━━━ 6. Build Debug APK ━━━
      - name: Build Debug APK
        script: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

      # ━━━ 7. Build Release APK ━━━
      - name: Build Release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s))) \
            --shrink \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ━━━ 8. Build App Bundle ━━━
      - name: Build App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/debug-info

    publishing:
      email:
        recipients:
          - paulomkenya0@gmail.com
        notify:
          success: true
          failure: true
