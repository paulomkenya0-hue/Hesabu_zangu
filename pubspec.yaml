name: hesabu_zangu
description: Hesabu Zangu - Simamia Mapato na Matumizi Yako

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ━━━ DATABASE (Offline) ━━━
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ━━━ PDF GENERATION ━━━
  pdf: ^3.10.8
  printing: ^5.11.0

  # ━━━ EXCEL GENERATION ━━━
  excel: ^4.0.2

  # ━━━ CHARTS ━━━
  fl_chart: ^0.66.0

  # ━━━ NOTIFICATIONS ━━━
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # ━━━ FILE HANDLING ━━━
  path_provider: ^2.1.2
  open_file: ^3.3.2
  share_plus: ^9.0.0

  # ━━━ UI & ICONS ━━━
  iconsax: ^0.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # ━━━ UTILITIES ━━━
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
